<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-label="AgentTrace logo">
  <title>AgentTrace</title>
  <!-- Magnifying glass lens -->
  <circle
    cx="26"
    cy="26"
    r="16"
    fill="none"
    stroke="#38bdf8"
    stroke-width="5"
    stroke-linecap="round"
  />
  <!-- Handle -->
  <line
    x1="38"
    y1="38"
    x2="52"
    y2="52"
    stroke="#38bdf8"
    stroke-width="6"
    stroke-linecap="round"
  />
  <!-- Trace line inside lens (agent execution path) -->
  <polyline
    points="13,28 19,17 25,30 31,14 36,27 41,19"
    fill="none"
    stroke="#c9d1d9"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Trace event markers (steps / tool calls / tokens) -->
  <circle cx="13" cy="28" r="2" fill="#38bdf8" />
  <circle cx="19" cy="17" r="2" fill="#38bdf8" />
  <circle cx="25" cy="30" r="2" fill="#38bdf8" />
  <circle cx="31" cy="14" r="2" fill="#f85149" />
  <circle cx="36" cy="27" r="2" fill="#38bdf8" />
  <circle cx="41" cy="19" r="2" fill="#3fb950" />
</svg>
