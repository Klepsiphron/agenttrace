<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1280"
  height="640"
  viewBox="0 0 1280 640"
  aria-label="AgentTrace social preview"
>
  <title>AgentTrace — Open-source AI agent observability</title>
  <desc>1280×640 GitHub social preview image</desc>

  <defs>
    <!-- Reusable logo mark (magnifying glass + trace path) -->
    <g id="logo-mark">
      <!-- Lens -->
      <circle
        cx="26"
        cy="26"
        r="16"
        fill="none"
        stroke="#38bdf8"
        stroke-width="5"
        stroke-linecap="round"
      />
      <!-- Handle -->
      <line
        x1="38"
        y1="38"
        x2="52"
        y2="52"
        stroke="#38bdf8"
        stroke-width="6"
        stroke-linecap="round"
      />
      <!-- Trace path -->
      <polyline
        points="13,28 19,17 25,30 31,14 36,27 41,19"
        fill="none"
        stroke="#c9d1d9"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <!-- Event dots -->
      <circle cx="13" cy="28" r="2" fill="#38bdf8" />
      <circle cx="19" cy="17" r="2" fill="#38bdf8" />
      <circle cx="25" cy="30" r="2" fill="#38bdf8" />
      <circle cx="31" cy="14" r="2" fill="#f85149" />
      <circle cx="36" cy="27" r="2" fill="#38bdf8" />
      <circle cx="41" cy="19" r="2" fill="#3fb950" />
    </g>

    <!-- Feature badge background -->
    <rect id="badge-bg" width="260" height="72" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" />
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0d1117" />

  <!-- Subtle background decoration: faint trace lines (right side) -->
  <g opacity="0.035">
    <polyline
      points="920,80 980,140 1040,90 1100,170 1160,100 1220,150 1280,110"
      fill="none"
      stroke="#38bdf8"
      stroke-width="1.5"
      stroke-linecap="round"
    />
    <polyline
      points="880,200 950,260 1010,210 1070,290 1130,230 1190,280 1280,240"
      fill="none"
      stroke="#c9d1d9"
      stroke-width="1"
      stroke-linecap="round"
    />
    <circle cx="980" cy="140" r="3" fill="#38bdf8" />
    <circle cx="1040" cy="90" r="3" fill="#38bdf8" />
    <circle cx="1100" cy="170" r="3" fill="#f85149" />
    <circle cx="1160" cy="100" r="3" fill="#38bdf8" />
  </g>

  <!-- Faint large logo watermark (bottom-right) -->
  <g opacity="0.028" transform="translate(980, 380)">
    <g transform="scale(2.6)">
      <use href="#logo-mark" />
    </g>
  </g>

  <!-- Main logo -->
  <g transform="translate(80, 78)">
    <g transform="scale(2.05)">
      <use href="#logo-mark" />
    </g>
  </g>

  <!-- Product name -->
  <text
    x="233"
    y="148"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="68"
    font-weight="700"
    letter-spacing="-1.8"
    fill="#c9d1d9"
  >AgentTrace</text>

  <!-- Tagline -->
  <text
    x="80"
    y="198"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#8b949e"
  >Open-source AI agent observability</text>

  <!-- Small supporting line -->
  <text
    x="80"
    y="226"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="15"
    fill="#8b949e"
    opacity="0.75"
  >Local-first • Zero cloud • Full visibility</text>

  <!-- Features section label -->
  <text
    x="72"
    y="260"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="11"
    font-weight="600"
    letter-spacing="1.5"
    fill="#8b949e"
  >KEY CAPABILITIES</text>

  <!-- Feature badges row -->
  <!-- Badge 1: Trace -->
  <g transform="translate(72, 274)">
    <use href="#badge-bg" />
    <!-- Trace icon -->
    <g transform="translate(20, 22)">
      <polyline
        points="0,18 8,6 16,16 24,2 28,12"
        fill="none"
        stroke="#38bdf8"
        stroke-width="2.2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <circle cx="0" cy="18" r="2.2" fill="#38bdf8" />
      <circle cx="8" cy="6" r="2.2" fill="#38bdf8" />
      <circle cx="16" cy="16" r="2.2" fill="#38bdf8" />
      <circle cx="24" cy="2" r="2.2" fill="#f85149" />
      <circle cx="28" cy="12" r="2.2" fill="#3fb950" />
    </g>
    <text
      x="58"
      y="45"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-size="20"
      font-weight="600"
      fill="#c9d1d9"
    >Trace</text>
  </g>

  <!-- Badge 2: Cost -->
  <g transform="translate(364, 274)">
    <use href="#badge-bg" />
    <!-- Cost / bars icon -->
    <g transform="translate(22, 22)">
      <rect x="0" y="22" width="7" height="12" rx="1.5" fill="#38bdf8" />
      <rect x="11" y="10" width="7" height="24" rx="1.5" fill="#38bdf8" />
      <rect x="22" y="15" width="7" height="19" rx="1.5" fill="#38bdf8" />
    </g>
    <text
      x="58"
      y="45"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-size="20"
      font-weight="600"
      fill="#c9d1d9"
    >Cost</text>
  </g>

  <!-- Badge 3: Alert -->
  <g transform="translate(656, 274)">
    <use href="#badge-bg" />
    <!-- Alert / bell icon -->
    <g transform="translate(20, 22)">
      <!-- Bell body -->
      <path
        d="M16 4 Q9 4 9 11 L9 18 Q6 20 6 23 L26 23 Q26 20 23 18 L23 11 Q23 4 16 4"
        fill="none"
        stroke="#38bdf8"
        stroke-width="2.3"
        stroke-linejoin="round"
      />
      <!-- Bell top -->
      <line
        x1="16"
        y1="4"
        x2="16"
        y2="1.5"
        stroke="#38bdf8"
        stroke-width="2.3"
        stroke-linecap="round"
      />
      <!-- Bell ball -->
      <circle cx="16" cy="26" r="3" fill="#38bdf8" />
    </g>
    <text
      x="58"
      y="45"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-size="20"
      font-weight="600"
      fill="#c9d1d9"
    >Alert</text>
  </g>

  <!-- Badge 4: Dashboard -->
  <g transform="translate(948, 274)">
    <use href="#badge-bg" />
    <!-- Dashboard / grid icon -->
    <g transform="translate(20, 22)">
      <rect x="1" y="1" width="11" height="11" rx="2" fill="none" stroke="#38bdf8" stroke-width="2" />
      <rect x="17" y="1" width="11" height="11" rx="2" fill="none" stroke="#38bdf8" stroke-width="2" />
      <rect x="1" y="17" width="11" height="11" rx="2" fill="none" stroke="#38bdf8" stroke-width="2" />
      <rect x="17" y="17" width="11" height="11" rx="2" fill="none" stroke="#38bdf8" stroke-width="2" />
    </g>
    <text
      x="58"
      y="45"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-size="20"
      font-weight="600"
      fill="#c9d1d9"
    >Dashboard</text>
  </g>

  <!-- Bottom footer bar -->
  <g>
    <!-- Subtle top border for footer area -->
    <line x1="72" y1="555" x2="1208" y2="555" stroke="#30363d" stroke-width="1" />

    <!-- Repo link -->
    <text
      x="80"
      y="588"
      font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
      font-size="15"
      fill="#38bdf8"
    >github.com/Klepsiphron/agenttrace</text>

    <!-- Right side meta -->
    <text
      x="1200"
      y="588"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-size="14"
      fill="#8b949e"
      text-anchor="end"
    >MIT • Open source</text>
  </g>
</svg>
