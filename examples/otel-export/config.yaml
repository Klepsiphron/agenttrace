# OpenTelemetry Collector Configuration for AgentTrace
#
# This config receives traces via OTLP (gRPC + HTTP) and exports to:
#   - Jaeger (native OTLP receiver)
#   - Zipkin
#   - Datadog (via the Datadog exporter)
#
# Usage:
#   docker compose up -d
#   The collector listens on:
#     - gRPC OTLP: 4317
#     - HTTP OTLP: 4318
#
# Backends:
#   - Jaeger UI:       http://localhost:16686
#   - Zipkin UI:       http://localhost:9411
#   - Datadog:         configure API key below

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
    send_batch_max_size: 1024

  # Add resource attributes to every span
  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert
      - key: service.namespace
        value: agenttrace
        action: upsert

  # Optional: sample traces in high-volume setups
  # probabilistic_sampler:
  #   sampling_percentage: 50

exporters:
  # ---- Jaeger (native OTLP) ----
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # ---- Zipkin ----
  zipkin:
    endpoint: http://zipkin:9411/api/v2/spans
    format: proto

  # ---- Datadog ----
  datadog:
    api:
      key: ${DD_API_KEY}
      site: datadoghq.com
    traces:
      span_name_remappings:
        agenttrace.span: agenttrace.operation
    host_metadata:
      enabled: true

  # ---- Debug (stdout, useful for development) ----
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/jaeger, zipkin, datadog, debug]

  # Health check endpoint (used by docker-compose healthcheck)
  health_check:
    endpoint: 0.0.0.0:13133

  # Prometheus metrics from the collector itself
  metrics:
    level: basic
    address: 0.0.0.0:8888

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8889
