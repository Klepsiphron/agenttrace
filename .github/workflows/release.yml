name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm format:check

  release:
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/agenttrace-io/

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view ${{ github.ref_name }} --repo ${{ github.repository }} &>/dev/null; then
            echo "Release ${{ github.ref_name }} already exists, skipping"
          else
            gh release create ${{ github.ref_name }} \
              --generate-notes \
              --title "AgentTrace ${{ github.ref_name }}" \
              --repo ${{ github.repository }}
          fi

      # --- npm publish (token-based) ---
      - name: Publish @agenttrace-io/sdk to npm
        run: npm publish --access public
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @agenttrace-io/dashboard to npm
        run: npm publish --access public
        working-directory: packages/dashboard
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @agenttrace-io/cli to npm
        run: npm publish --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm packages published
        run: |
          for pkg in @agenttrace-io/sdk @agenttrace-io/dashboard @agenttrace-io/cli; do
            PUBLISHED=$(npm view "$pkg" version 2>/dev/null)
            EXPECTED=$(node -p "require('./packages/${pkg##*/}/package.json').version" 2>/dev/null || echo "unknown")
            if [ "$PUBLISHED" = "$EXPECTED" ]; then
              echo "✅ $pkg@$EXPECTED published successfully"
            else
              echo "❌ $pkg: expected $EXPECTED, found $PUBLISHED"
              exit 1
            fi
          done

      # --- PyPI publish (OIDC Trusted Publishing, with token fallback) ---
      - name: Build Python package
        run: |
          cd packages/sdk-python
          pip install build
          python -m build

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk-python/dist/
        continue-on-error: true
        id: pypi-oidc

      - name: Publish to PyPI via API token (fallback)
        if: steps.pypi-oidc.outcome == 'failure'
        run: |
          pip install twine
          twine upload packages/sdk-python/dist/*
        continue-on-error: true
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      # --- Docker publish to GHCR ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
