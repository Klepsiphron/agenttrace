<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 • AgentTrace</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <style>
      .error-wrap { min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; }
      .error-code { font-size: 92px; font-weight: 700; letter-spacing: -4px; line-height: 1; color: #fff; }
      .error-msg { font-size: 18px; color: var(--text-muted); margin: 12px 0 24px; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <svg class="brand-logo" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="9" stroke="#3b82f6" stroke-width="2" />
            <path d="M8 12l3 3 5-5" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <h1 style="margin:0;font-size:18px">AgentTrace</h1>
        </div>
        <a href="/" class="btn btn-secondary">← Back to dashboard</a>
      </div>
    </header>
    <div class="error-wrap container">
      <div>
        <div class="error-code">404</div>
        <div class="error-msg">Page not found. The trace you’re looking for may have been pruned by retention policy.</div>
        <a href="/" class="btn btn-primary">Go to Dashboard</a>
        <div style="margin-top:24px;font-size:12px;color:#666">Or run <span class="mono">npx agenttrace-io dashboard</span> again.</div>
      </div>
    </div>
  </body>
</html>
