# docker-compose.prod.yml
# Production Docker Compose for AgentTrace
# Services: AgentTrace Dashboard + PostgreSQL + Nginx Reverse Proxy
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Environment:
#   Copy .env.example to .env and adjust values before first run.
#   Required: POSTGRES_PASSWORD, AGENTTRACE_API_KEY
#
# Ports:
#   80   - Nginx (HTTP)
#   443  - Nginx (HTTPS - configure certs in nginx/certs/)

version: '3.8'

services:
  # ---- PostgreSQL (Production Database) ----
  postgres:
    image: postgres:16-alpine
    container_name: agenttrace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agenttrace}
      POSTGRES_USER: ${POSTGRES_USER:-agenttrace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      # Performance tuning for containerized PG
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --locale=C'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Optional: custom PostgreSQL config
      # - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - '127.0.0.1:5432:5432' # Bind to localhost only; internal network for app
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-agenttrace} -d ${POSTGRES_DB:-agenttrace}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    networks:
      - agenttrace-net
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ---- AgentTrace Dashboard ----
  agenttrace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agenttrace-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database: PostgreSQL connection string
      # The app reads AGENTTRACE_DB_PATH; for PG we use DATABASE_URL
      # If DATABASE_URL is set, the SDK should use it; otherwise falls back to SQLite
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agenttrace}
      # Fallback SQLite path (used if DATABASE_URL is not supported by current SDK)
      AGENTTRACE_DB_PATH: /app/data/agenttrace.db
      NODE_ENV: production
      # Dashboard config
      AGENTTRACE_PORT: 4317
      AGENTTRACE_HOST: 0.0.0.0
      # API key for dashboard access (generate with: openssl rand -hex 32)
      AGENTTRACE_API_KEY: ${AGENTTRACE_API_KEY:-}
      # Optional: log level
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      # Persistent volume for SQLite DB (fallback / migration path)
      - agenttrace-data:/app/data
    expose:
      - '4317' # Internal only; nginx proxies to this
    ports:
      - '127.0.0.1:4317:4317' # Direct access for debugging (localhost only)
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4317/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'
    networks:
      - agenttrace-net
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:1.27-alpine
    container_name: agenttrace-nginx
    restart: unless-stopped
    depends_on:
      agenttrace:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # Nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL certificates (mount your own or use certbot)
      - ./nginx/certs:/etc/nginx/certs:ro
      # Shared cache
      - nginx-cache:/var/cache/nginx
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
        reservations:
          memory: 16M
          cpus: '0.05'
    networks:
      - agenttrace-net
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

# ---- Named Volumes ----
volumes:
  postgres-data:
    driver: local
    labels:
      com.agenttrace.description: 'PostgreSQL data for AgentTrace'
  agenttrace-data:
    driver: local
    labels:
      com.agenttrace.description: 'AgentTrace SQLite data (fallback/migration)'
  nginx-cache:
    driver: local
    labels:
      com.agenttrace.description: 'Nginx proxy cache'

# ---- Networks ----
networks:
  agenttrace-net:
    driver: bridge
    labels:
      com.agenttrace.description: 'AgentTrace internal network'
